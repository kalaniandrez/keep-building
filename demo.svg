<svg xmlns="http://www.w3.org/2000/svg" width="860" height="326" viewBox="0 0 860 326" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace">
  <rect x="0.5" y="0.5" width="859" height="325" rx="10" fill="#0d1117" stroke="#30363d"/>
  <rect x="0.5" y="0.5" width="859" height="40" rx="10" fill="#161b22"/>
  <rect x="0.5" y="30" width="859" height="11" fill="#161b22"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="20" r="6" fill="#27c93f"/>
  <text x="430" y="25" text-anchor="middle" fill="#8b949e" font-size="13">keep-building — hand the repo to the next AI, pre-briefed</text>
  <g font-size="14.5">
    <text x="24" y="76"><tspan fill="#ff2d88">$ </tspan><tspan fill="#e6edf3">checkpoint </tspan><tspan fill="#a5d6ff">"auth flow returns a token"</tspan></text>
    <text x="24" y="102"><tspan fill="#3fb950">&#10003; </tspan><tspan fill="#c9d1d9">committed + pushed</tspan><tspan fill="#8b949e">  ·  main a1b9f2c</tspan></text>
    <text x="24" y="140"><tspan fill="#8b949e"># ...claude hits its usage limit mid-build</tspan></text>
    <text x="24" y="176"><tspan fill="#ff2d88">$ </tspan><tspan fill="#e6edf3">keep-building </tspan><tspan fill="#ffa657">codex</tspan></text>
    <text x="24" y="202"><tspan fill="#58a6ff">&#8594; </tspan><tspan fill="#c9d1d9">checkpointed. handing the repo to codex, pre-briefed:</tspan></text>
    <text x="24" y="226"><tspan fill="#c9d1d9">  reads </tspan><tspan fill="#e6edf3">AGENTS.md</tspan><tspan fill="#c9d1d9"> + recent git history, continues the same build.</tspan></text>
    <text x="24" y="262"><tspan fill="#3fb950">[codex] </tspan><tspan fill="#c9d1d9">picking up where claude left off. no context lost.</tspan></text>
    <text x="24" y="298"><tspan fill="#ff2d88">$ </tspan><tspan fill="#e6edf3">_</tspan></text>
  </g>
</svg>
